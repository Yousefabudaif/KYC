<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Complete - KYC Portal</title>
    <meta name="description" content="Your signup is under review">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .success-animation {
            animation: successBounce 0.6s ease;
        }

        @keyframes successBounce {
            0% {
                transform: scale(0);
            }

            50% {
                transform: scale(1.2);
            }

            70% {
                transform: scale(0.9);
            }

            100% {
                transform: scale(1);
            }
        }

        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            opacity: 0;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }

            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>

<body>
    <div class="confetti" id="confetti"></div>

    <div class="container">
        <div class="nav">
            <span class="nav-brand">🛡️ KYC Portal</span>
            <div class="nav-actions">
                <button onclick="logout()" class="btn btn-sm btn-outline">Logout</button>
            </div>
        </div>

        <!-- Steps indicator - all complete -->
        <div class="steps">
            <div class="step completed">
                <div class="step-dot">✓</div>
            </div>
            <div class="step-line" style="background: var(--accent-green);"></div>
            <div class="step completed">
                <div class="step-dot">✓</div>
            </div>
            <div class="step-line" style="background: var(--accent-green);"></div>
            <div class="step completed">
                <div class="step-dot">✓</div>
            </div>
            <div class="step-line" style="background: var(--accent-green);"></div>
            <div class="step completed">
                <div class="step-dot">✓</div>
            </div>
        </div>

        <div class="card">
            <div class="kyc-status success">
                <div class="status-icon success-animation">🎉</div>
                <h3>Thank You!</h3>
                <p>Your signup is under review. We will notify you once your application has been processed.</p>

                <div id="statusBadge" style="margin-bottom: 1.5rem;">
                    <span class="badge badge-pending">⏳ Under Review</span>
                </div>

                <div
                    style="background: var(--bg-glass); border-radius: var(--radius-md); padding: 1.25rem; text-align: left; margin-bottom: 1.5rem;">
                    <p style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7;">
                        <strong>What happens next?</strong><br>
                        • Our team will review your documents<br>
                        • You'll be notified of the decision<br>
                        • This usually takes 1-2 business days
                    </p>
                </div>

                <button onclick="window.location.href='/'" class="btn btn-outline">
                    🏠 Return to Home
                </button>
            </div>
        </div>
    </div>

    <script>
        // Create confetti effect
        function createConfetti() {
            const container = document.getElementById('confetti');
            const colors = ['#3b82f6', '#8b5cf6', '#10b981', '#f59e0b', '#ef4444', '#ec4899'];

            for (let i = 0; i < 50; i++) {
                const piece = document.createElement('div');
                piece.classList.add('confetti-piece');
                piece.style.left = Math.random() * 100 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = Math.random() * 2 + 's';
                piece.style.animationDuration = (2 + Math.random() * 2) + 's';
                piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                piece.style.width = (5 + Math.random() * 10) + 'px';
                piece.style.height = (5 + Math.random() * 10) + 'px';
                container.appendChild(piece);
            }

            setTimeout(() => container.remove(), 5000);
        }

        async function init() {
            try {
                const res = await fetch('/api/me');
                if (!res.ok) { window.location.href = '/login.html'; return; }
                const data = await res.json();

                if (data.signup) {
                    const badge = document.getElementById('statusBadge');
                    if (data.signup.status === 'approved') {
                        badge.innerHTML = '<span class="badge badge-approved">✅ Approved</span>';
                    } else if (data.signup.status === 'rejected') {
                        badge.innerHTML = '<span class="badge badge-rejected">❌ Rejected</span>';
                    }
                }

                createConfetti();
            } catch (err) {
                console.error('Init error:', err);
            }
        }

        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/';
        }

        init();
    </script>
</body>

</html>
